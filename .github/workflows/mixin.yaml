name: mixin

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:  
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Set up Go
        uses: actions/setup-go@0a12ed9d6a96ab950c8f026ed9f722fe0da7ef32 # v5.0.2
        with:
          go-version: 1.22.x

      - name: Generate
        run: make examples

      - name: Check
        run: make check-examples

  lint:
    runs-on: ubuntu-latest
    name: Linters (Static Analysis) for Jsonnet (mixin)
    steps:
      - name: Checkout code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Install Go
        uses: actions/setup-go@0a12ed9d6a96ab950c8f026ed9f722fe0da7ef32 # v5.0.2
        with:
          go-version: 1.22.x

      - name: Format
        run: |
          make jsonnet-format
          git diff --exit-code

      - name: Linting
        run: make jsonnet-lint
